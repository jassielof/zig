name: ci

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      run_tests:
        description: 'Run test suite'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  x86_64-linux-debug:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Zig (nightly)
        uses: mlugg/setup-zig@v1
        with:
          version: master

      - name: Cache Zig build cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/zig-global-cache
          key: zig-cache-linux-${{ github.sha }}
          restore-keys: |
            zig-cache-linux-

      - name: Build
        run: |
          zig build \
            -p stage3-debug \
            --zig-lib-dir lib \
            -Doptimize=Debug \
            -Dno-lib
        env:
          ZIG_GLOBAL_CACHE_DIR: ~/.cache/zig-global-cache
          ZIG_LOCAL_CACHE_DIR: ${{ github.workspace }}/zig-local-cache

      - name: Test
        if: ${{ inputs.run_tests }}
        run: |
          stage3-debug/bin/zig build test \
            --zig-lib-dir lib \
            -Dskip-non-native \
            -Dskip-llvm \
            -Dskip-test-incremental \
            --test-timeout 10m
        env:
          ZIG_GLOBAL_CACHE_DIR: ~/.cache/zig-global-cache
          ZIG_LOCAL_CACHE_DIR: ${{ github.workspace }}/zig-local-cache

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: zig-x86_64-linux-debug
          path: stage3-debug/
          retention-days: 7

  x86_64-windows-debug:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Zig (nightly)
        uses: mlugg/setup-zig@v1
        with:
          version: master

      - name: Cache Zig build cache
        uses: actions/cache@v6
        with:
          path: ~\AppData\Local\zig-global-cache
          key: zig-cache-windows-${{ github.sha }}
          restore-keys: |
            zig-cache-windows-

      - name: Build
        shell: pwsh
        run: |
          zig build `
            -p stage3-debug `
            --zig-lib-dir lib `
            -Doptimize=Debug `
            -Dno-lib
        env:
          ZIG_GLOBAL_CACHE_DIR: ~\AppData\Local\zig-global-cache
          ZIG_LOCAL_CACHE_DIR: ${{ github.workspace }}\zig-local-cache

      - name: Test
        if: ${{ inputs.run_tests }}
        shell: pwsh
        run: |
          stage3-debug\bin\zig build test `
            --zig-lib-dir lib `
            -Dskip-non-native `
            -Dskip-llvm `
            -Dskip-test-incremental `
            --test-timeout 30m
        env:
          ZIG_GLOBAL_CACHE_DIR: ~\AppData\Local\zig-global-cache
          ZIG_LOCAL_CACHE_DIR: ${{ github.workspace }}\zig-local-cache

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: zig-x86_64-windows-debug
          path: stage3-debug\
          retention-days: 7

