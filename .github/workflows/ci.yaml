name: ci

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      run_tests:
        description: 'Run test suite'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  DEVKIT_VERSION: "0.17.0-dev.203+073889523"

jobs:
  x86_64-linux-debug:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Cache dev kit
        id: cache-devkit
        uses: actions/cache@v6
        with:
          path: ~/deps
          key: devkit-linux-${{ env.DEVKIT_VERSION }}

      - name: Download Linux dev kit
        if: steps.cache-devkit.outputs.cache-hit != 'true'
        run: |
          BASENAME="zig+llvm+lld+clang-x86_64-linux-musl-${{ env.DEVKIT_VERSION }}"
          curl -fL "https://ziglang.org/deps/$BASENAME.tar.xz" -o devkit.tar.xz
          mkdir -p "$HOME/deps"
          tar -xf devkit.tar.xz -C "$HOME/deps"

      - name: Set DEVKIT path
        run: |
          BASENAME="zig+llvm+lld+clang-x86_64-linux-musl-${{ env.DEVKIT_VERSION }}"
          echo "DEVKIT=$HOME/deps/$BASENAME" >> $GITHUB_ENV

      - name: Cache Zig build cache
        uses: actions/cache@v6
        with:
          path: |
            ~/.cache/zig-global-cache
          key: zig-cache-linux-${{ github.sha }}
          restore-keys: |
            zig-cache-linux-

      - name: Build
        run: |
          "$DEVKIT/bin/zig" build \
            -p stage3-debug \
            --search-prefix "$DEVKIT" \
            --zig-lib-dir lib \
            -Dstatic-llvm \
            -Duse-zig-libcxx \
            -Dtarget=x86_64-linux-musl \
            -Doptimize=Debug
        env:
          ZIG_GLOBAL_CACHE_DIR: ~/.cache/zig-global-cache
          ZIG_LOCAL_CACHE_DIR: ${{ github.workspace }}/zig-local-cache

      - name: Test
        if: ${{ inputs.run_tests }}
        run: |
          stage3-debug/bin/zig build test \
            --zig-lib-dir lib \
            --search-prefix "$DEVKIT" \
            -Dstatic-llvm \
            -Dskip-non-native \
            -Dskip-test-incremental \
            --test-timeout 10m
        env:
          ZIG_GLOBAL_CACHE_DIR: ~/.cache/zig-global-cache
          ZIG_LOCAL_CACHE_DIR: ${{ github.workspace }}/zig-local-cache

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: zig-x86_64-linux-debug
          path: stage3-debug/
          retention-days: 7

  x86_64-windows-debug:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Cache dev kit
        id: cache-devkit
        uses: actions/cache@v6
        with:
          path: ~\deps
          key: devkit-windows-${{ env.DEVKIT_VERSION }}

      - name: Download Windows dev kit
        if: steps.cache-devkit.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $BASENAME = "zig+llvm+lld+clang-x86_64-windows-gnu-${{ env.DEVKIT_VERSION }}"
          $DEPS = "$Env:USERPROFILE\deps"
          New-Item -ItemType Directory -Force -Path $DEPS | Out-Null
          Invoke-WebRequest "https://ziglang.org/deps/$BASENAME.zip" -OutFile devkit.zip
          Expand-Archive devkit.zip -DestinationPath $DEPS

      - name: Set DEVKIT path
        shell: pwsh
        run: |
          $BASENAME = "zig+llvm+lld+clang-x86_64-windows-gnu-${{ env.DEVKIT_VERSION }}"
          echo "DEVKIT=$Env:USERPROFILE\deps\$BASENAME" | Out-File -FilePath $Env:GITHUB_ENV -Append

      - name: Cache Zig build cache
        uses: actions/cache@v6
        with:
          path: ~\AppData\Local\zig-global-cache
          key: zig-cache-windows-${{ github.sha }}
          restore-keys: |
            zig-cache-windows-

      - name: Build
        shell: pwsh
        run: |
          & "$Env:DEVKIT\bin\zig.exe" build `
            -p stage3-debug `
            --search-prefix "$Env:DEVKIT" `
            --zig-lib-dir lib `
            -Dstatic-llvm `
            -Duse-zig-libcxx `
            "-Dtarget=x86_64-windows-gnu" `
            -Doptimize=Debug
        env:
          ZIG_GLOBAL_CACHE_DIR: ~\AppData\Local\zig-global-cache
          ZIG_LOCAL_CACHE_DIR: ${{ github.workspace }}\zig-local-cache

      - name: Test
        if: ${{ inputs.run_tests }}
        shell: pwsh
        run: |
          stage3-debug\bin\zig build test `
            --zig-lib-dir lib `
            --search-prefix "$Env:DEVKIT" `
            -Dstatic-llvm `
            -Dskip-non-native `
            -Dskip-test-incremental `
            --test-timeout 30m
        env:
          ZIG_GLOBAL_CACHE_DIR: ~\AppData\Local\zig-global-cache
          ZIG_LOCAL_CACHE_DIR: ${{ github.workspace }}\zig-local-cache

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: zig-x86_64-windows-debug
          path: stage3-debug\
          retention-days: 7

